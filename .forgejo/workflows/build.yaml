name: Build App

on:
  push:
    branches-ignore:
      - 'main'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Build job – CI only, runs on feature branch pushes and PRs
  # Never runs on direct pushes to main (releases are handled by release.yaml)
  # Uses the CODeRUS SailfishOS Platform SDK Docker image DIRECTLY as a job
  # container – avoids Docker-in-Docker (no socket needed on the runner host).
  # The runner starts the image; mb2 cross-compiles inside it.
  # Coderepo for target releases: https://github.com/CODeRUS/docker-sailfishos-platform-sdk
  # Available SDK releases: https://hub.docker.com/r/coderus/sailfishos-platform-sdk/tags
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.arch }})
    # Avoid duplicate builds: on pull_request, only run for forks (push already covers internal branches)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: docker
    # The SDK image is used directly as the job container.
    # The Forgejo runner starts this container; no docker run inside it is needed.
    container:
      image: coderus/sailfishos-platform-sdk:5.0.0.43

    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armv7hl, i486]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build RPM package
        # mb2 cross-compiles for the target architecture using the SDK's sysroot/sb2.
        run: |
          mb2 -t SailfishOS-5.0.0.43-${{ matrix.arch }} build

      - name: Harbour compliance check and build output
        # Inline check: list built packages and show their contents.
        # RPM name must start with harbour-, no bundled shared libs, etc.
        shell: bash
        run: |
          echo "=== Built RPMs ==="
          ls -lh RPMS/ || { echo "ERROR: RPMS/ directory not found"; exit 1; }
          echo ""
          echo "=== Package contents (non-debug) ==="
          for rpm in RPMS/*.rpm; do
            [[ "$rpm" == *"-debuginfo-"* || "$rpm" == *"-debugsource-"* ]] && continue
            echo "--- $rpm ---"
            rpm -qpl "$rpm" 2>/dev/null || true
          done
          echo ""
          echo "=== Harbour name check ==="
          for rpm in RPMS/*.rpm; do
            [[ "$rpm" == *"-debuginfo-"* || "$rpm" == *"-debugsource-"* ]] && continue
            basename "$rpm" | grep -q '^harbour-' \
              && echo "OK: $rpm" \
              || { echo "FAIL: RPM does not start with 'harbour-': $rpm"; exit 1; }
          done

      - name: Determine artifact name
        id: artifact-name
        shell: bash
        run: |
          VERSION=$(grep '^Version:' rpm/harbour-find-my-device.spec | awk '{print $2}')
          RELEASE_NUM=$(grep '^Release:' rpm/harbour-find-my-device.spec | awk '{print $2}')
          NAME="harbour-find-my-device-${VERSION}-${RELEASE_NUM}-SNAPSHOT.${{ matrix.arch }}.rpm"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "Artifact name: ${NAME}"

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            RPMS/*.rpm
            !RPMS/*-debuginfo-*.rpm
            !RPMS/*-debugsource-*.rpm
          retention-days: 30
          if-no-files-found: error