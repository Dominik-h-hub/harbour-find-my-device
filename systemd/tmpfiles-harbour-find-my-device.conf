# Find My Device: spool directory for privileged action requests.
# The root priv service (harbour-find-my-device-priv.service) reads requests here;
# the non-root user daemon writes them. Lives on tmpfs (/run), so it is recreated
# on every boot.
#
# Owned by uid/gid 100000 -- the primary Sailfish user (defaultuser/nemo) that the
# user daemon runs as -- because that user is NOT reliably in the 'privileged'
# group. Root reads/drains the spool regardless of mode.
d /run/harbour-find-my-device       0755 root root     -
d /run/harbour-find-my-device/spool 0700 100000 100000 -